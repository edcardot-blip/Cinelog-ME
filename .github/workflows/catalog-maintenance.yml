name: Catalog maintenance

# Refreshes streaming availability (TMDB) + rotates ratings (OMDb) over the catalog.
# Manual dispatch defaults to dry-run; the scheduled run writes. Both process the
# stalest rows first, so nightly runs keep the whole catalog rotating.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes)"
        type: boolean
        default: true
      streaming_batch:
        description: "Films to refresh streaming for"
        type: string
        default: "2500"
      ratings_batch:
        description: "Films to refresh ratings for (OMDb-budgeted)"
        type: string
        default: "500"
  # Nightly schedule is added once the dry-run + first live sweep are validated and
  # migration 002 (tmdb_id) is applied:
  #   schedule:
  #     - cron: "0 10 * * *"   # daily 10:00 UTC (after the additions run at 09:00)

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run refresh
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run == true) && '1' || '0' }}
          STREAMING_BATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.streaming_batch || '2500' }}
          RATINGS_BATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.ratings_batch || '500' }}
        run: node pipeline/refresh.mjs
